body:
  text: 引龍其念東高先生千里東余自謂年來一味淨土娑婆境風浩浩真如哲草堂清皆不免蹉跌勉余留心此件余偶舉示百亭法師而法師先有勢至念佛章疏鈔在余案頭兩人取卷重閲盡然興嘆謂高先生以身踐為救時之藥語也遂命兒子募資刻之刻既竣法師復謂余辨其首余惟華嚴大經德雲首宣念佛法門馬鳴菩薩立論之祖念佛與止觀並重而楞嚴為談性之書然勢至念佛一章列在圓通禪宗下不能抑蓮宗為非歸源見性之途也明矣今彌陀疏鈔龍舒淨土等文布在禪林惟勢至章僅附本經而未有專行之疏法師詮文釋義勒成一書為震旦人添一重往生舟筏不可謂非淨土之功臣也又明矣遂以此意復高先生而繼之以臆説云蓮師云念一佛名換彼百千萬億之雜念也即念即空居然本體非於念外別得菩提又云執持名號至於一心則復還空寂之體又云當知淨土唯心更無外境自性還歸本體是願生彼國義如是則蓮師雖極力主張西方淨土而不遺宗門見性之旨彰彰如是矣則謂見性為淨土指歸而淨土為見性入路未相違也見性則掉臂皆淨土而蓮臺自不消説不見性則淨土非了手而種因要自不退然則見性與不見性而念佛修淨土皆不可忽也此義似本章所未及言既以復於高遂筆之此以質諸真能念佛人為何如也康熙庚申長至錢唐戴京曾書大佛頂首楞嚴經大勢至菩薩念佛圓通章唐天竺沙門般剌密帝譯大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名為香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一楞嚴云佛告阿難若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國則此章經誠為銷罪之巨冶愈病之靈丹修心之捷徑求生之要術也若能常持無苦不除無樂不與無願不遂無果不得凡見聞者宜三復焉日誦式人有三等一者極間人應當晝夜六時持經念佛二者半間半忙人應當每日晨昏二時一心持念三者極忙人應當每日晨朝一時專心持念誦時之式先本師三稱次舉勢至章一遍往生咒三遍讚佛偈一遍佛名百聲千聲萬聲隨意三菩薩名每各十聲後發願回向偈一遍未誦前已誦後俱要對聖像前合掌三禮如無佛像對經對空禮拜亦可果能如此常行無間佛必哀憐凡有求願無不遂者臨命終時佛與聖衆放光接引徑生極樂矣行者當生信願切勿疑忽此明每日經佛並舉式也若單佛名極間者除六時外應當時刻念佛無間半間半忙者應當營事已畢即便念佛極忙者應當忙裏偷間十念念佛此方名為不虗度也盡此一生一日無有暫廢則自念佛心口當必成佛心口經云行與佛同受佛氣分入如來種親為佛子不其然哉南無本師釋迦牟尼佛三稱次勢至章畢舉往生呪南無阿彌哆婆夜一哆他伽哆夜二哆地夜他三阿彌利都婆毗四阿彌利哆五悉耽婆毗六阿彌利哆七毗迦蘭帝八阿彌利哆九毗迦蘭哆十伽彌膩十一伽伽那十二枳多迦利十三娑婆訶十四不思議神力傳云持呪之法淨身漱口然香佛前晝夜六時各誦三七遍能滅五逆謗法等罪誦滿三十萬遍即見阿彌陀佛彌陀疏鈔云若有善男子善女人能誦此呪者阿彌陀佛常住其頂日夜擁護無令怨家而得其便現世常得安隱臨命終時任運往生次舉讚佛偈阿彌陀佛身金色相好光明無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩衆亦無邊四十八願度衆生九品咸令登彼岸南無西方極樂世界大慈大悲阿彌陀佛百千萬聲隨意南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩各十稱後舉發願回向偈我今稱念阿彌陀真實功德佛名號惟願慈悲哀攝受證知懺悔及所願往昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎願以此功德莊嚴佛淨土上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國十方三世一切佛一切菩薩摩訶薩摩訶般若波羅蜜一遍此當對佛跪念念畢起身三禮而退偈云一日無常到方知夢裏人萬般將不去唯有業隨身如何是萬般將不去官爵財寶屋宅田園衣服飲食乃至嬌妻愛子無常到來都是將不去者如何是唯有業隨身人生所造貪瞋癡慢五逆十惡惡業戒定慧施五戒十善善業無常到來盡皆緊隨你者楞嚴云臨命終時未捨暖觸一生善惡俱時頓現惡者便感三途苦報善者便感人天樂報若善心中兼有信願念佛求生便現極樂佛土境相行願品云是人終時一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失象馬車乘珍寶伏藏無復相隨唯此願王於一切時引導其前一剎那中即得往生極樂世界見彌陀佛及諸聖衆既然如是何不趂此強健之時努力勤修善導云假饒金玉滿堂難免生老病死恁汝千般快樂無常終是到來惟有徑路修行但念阿彌陀佛設待臨終方悔悔之於後將何及乎奉勸諸人及時修進生死事大無常迅速慎勿以此為分外也勉之勉之又淨業人備三資糧一者信信輪回最苦信念佛最妙信此土修行難成道果信願生彼土乃至十念決得往生信報生人天福盡還墜信一生樂土永不退轉當成正覺信一稱佛名能滅八十億劫生死重罪信念佛之人彌陀攝取病中救護命終來迎二者願願消業障願滅衆苦願心開願見佛願淨業成願生安養願授記願度生三者行身禮像口稱名心觀想俱要專一絶無散亂解知信願時蓮華種植也專念時蓮華出水也功成時蓮華敷空也設起疑退心蓮華又萎矣由是晝夜六時無有一念貪戀在娑婆凡起居衣食語默動靜皆不忘淨土至於臨命終時應當念佛發願不得怕死貪生常自念言我現在身衆苦交纏不淨流溢若得捨此華池托質受無量樂事極稱意如脫臭弊之衣得著珍御之服萬緣放下身心解脫才有病患莫論輕重便念無常一心待死即囑一切人凡來我前為我念佛不得雜説世務家緣長短再延法師頻來誡勸依經指示及到病重捨報之際家人親屬不得哭泣并發悲歎懊惱之聲猶恐惑亂心神忘失正念但高聲朗念阿彌陀佛守令氣絶神逝方可舉哀若如此者萬求萬生必無疑也復有遇障難者不得正念往生如偏風失語狂亂失心水火雷擊蟲獸鬼噉毒藥陳亡怨賊王難亦應預懺必蒙佛護蓋念佛者有六勝益一諸佛菩薩護念彌陀住頂放光諸天神將晝夜冥加二惡鬼毒藥皆不能害三災八難咸悉消除三宿障冰清怨命解脫四氣力充滿無諸橫病五睡夢吉祥見佛色像無有非人奪其精氣六現為一切禮敬臨終三聖接引故知日常一意念佛即為預備不虞法矣如人入城幹事必先覓下安處抵暮昏黑則有投宿之地先覓下處者預修淨業也抵暮昏黑者大限到來也有投宿地者生蓮華中不遭障難也人若依此用心臨終定得往生此又為修淨土者之至囑也慈雲香嚴行者續法述勸
