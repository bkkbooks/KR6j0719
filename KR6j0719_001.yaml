body:
  text: 清浙水慈雲灌頂沙門續法集釋此一章大分為三初通序大意二初詳申旨趣三初通序念佛宗致大矣哉念佛之為法門也大小並收利鈍均攝事理圓融性相無礙即佛是心無一心而非心佛即心是佛無一佛而非佛心心一憶也佛佛全彰佛一稱也心心頓顯無有心外佛為心所憶亦無佛外心為佛所稱衆生念佛佛在衆生心內佛念衆生衆生在佛心中是心作佛心不念而佛不作即佛顯心佛不稱而心不顯則知念佛一門誠為見性成佛之妙法矣大下分二先釋又二初總明該攝大矣哉者能讚詞亦是發語之端也念下所讚法初句標體念佛別也法門通也大等四句釋相初二句人也大小約乘利鈍約根並收均攝者化導小乘回小向大勉進大乘捨權歸實使上根三心一至誠心二深心三回向發願心圓發直入無生令下根十念成功亦生彼國次二句法也事理約行性相約諦圓融無礙者下愚著事而迷理小智執理而遺事今則通乎理事依理修則證真諦而見自性彌陀依事修則證俗諦而生極樂相土即下二別顯不二中先心佛不二初四句約性起心佛開五句一心外佛佛外心二心內佛佛唯心三心即是佛佛即是心四心非是佛佛非是心五心佛圓融無障無礙五教如次配知今明第三句義也此之心佛全體遍收如金與器以金收器器無所遺以器攝金金無不盡心一下八句約修顯心憶佛佛稱心皆明修也心憶佛彰心即是佛故佛稱心顯佛即是心故無為心憶心外無佛故無為佛稱佛外無心故華嚴回向品云無有智外如為智所入亦無如外智能證於如正此義也衆生下後三無差別謂心佛生三無別也初四句正明無別衆生念佛者諸佛心內衆生念衆生心中諸佛也佛在生心內者衆生心外更無別佛以佛真心即衆生真心故此明因門攝法無遺也故云衆生念佛現前當來必定見佛華嚴亦云應知自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故佛念衆生者衆生心內諸佛念諸佛心中衆生也生在佛心中者佛真心外更無衆生以衆生真心即佛真心故此明果門攝法無遺也故云十方如來憐念衆生如母憶子佛性論云一切衆生悉在如來智內以一切衆生決定無有出如如境者並為如來之所攝持據清涼疏開成四句一諸佛心外無別衆生二衆生心外更無別佛三佛心生心兩存齊現四生心佛心互奪雙亡今且約前二句明也是心下四句躡前反顯心本是佛由不覺而佛隱若欲作佛須當念心故起信謂衆生本覺與佛本覺無有二體若不念心難成佛矣佛本是心因無明而心暗若欲顯心須當念佛故華嚴謂佛智廣大遍衆生心衆生語言皆悉不離如來法輪若不稱佛難明心矣則知下次結彌陀即是自性淨土全唯一心離心性外毫無可得若能憶念即顯本性佛矣起信云法界一相即是如來平等法身性佛一顯果佛自證故圭山云今知心是佛心定當作佛不其然乎設離念佛門外而欲速見性成佛者捨其近易以求諸遠難也二別顯此章所詮所以十二如來號曰三昧勢至菩薩標為圓通三昧則總攝諸禪圓通則具足萬行一心頓實不亦宜乎所以下分為三初正顯所以者承前起後之辭十二如來號念佛為三昧者凡夫垢心混若黃河外道妄想逸如奔馬故説三昧欲令返染成淨捨散入寂也勢至菩薩標念佛為圓通者小乘七生斷惑證真權教三祇具因滿果故説圓通欲令速證疾成圓超直入也三昧下二重揀謂此三昧總攝世出世間一切禪定揀非餘三昧也如一巨冶鑄成千器圓通具足八萬四千一切觀行揀非餘圓通也猶阿伽陀總愈萬病末二句三勸誡三昧實教所詮圓通頓教所詮學頓實教者是其所宜也又上顯圓義此兼顯頓實衆生念佛定當成佛實也起信云專念阿彌修善回向願生彼界終得見佛華嚴云臨命終時諸根散壞唯此願王引導其前即得往生見彌陀佛蒙佛授記不久當坐菩提道場成等正覺衆生憶佛現前即見頓也佛藏經云無覺無觀名為念佛無想無語是名念佛摩訶般若云菩薩摩訶薩念佛不以色念不以受想行識念以諸法自性空故今兼顯此故頓實者宜應學也三引取勝益勸修聞説佛名威光證入於無盡憶想佛境德雲解脫於多門有此勝益應當信行何得自暴自棄不願不修耶聞説四句初引明説佛名者華嚴云勝雲佛現時寶華林中出説三世一切諸佛名號音聲時彼如來於衆會中説普集一切三世佛自在法修多羅入無盡者華嚴云勝雲佛所證得一切諸佛功德輪三昧證得一切佛法普門陀羅尼了知一切佛決定解莊嚴成就海了知無邊佛現一切衆生前神通海了知一切佛力無畏法於善眼佛所即得念佛三昧名無邊海藏門如是等十千法門皆得通達憶佛境者華嚴云德雲告善財言善男子我唯得此憶念一切諸佛境界智慧光明普見法門多解脫者華嚴云所謂智光普照念佛門乃至住虗空念佛門等二十一種有此下二結勸二初正勸諸餘法門淺則上根不被深則下根絶分唯此一法利鈍兼收如水清珠到處便益故當信受行持念佛如種穀自心如家田信如信栽此種定得成穀願如知此佳種一心求穀行如欣求得穀作耕耨事何得下二結責十界因果皆唯心現若一念心瞋恚邪淫即地獄界慳貪不施即餓鬼界愚癡暗蔽即畜生界我慢貢高即修羅界堅持五戒即人法界精修十善即天法界證悟人空即聲聞界知緣性離即緣覺界六度齊修即菩薩界真慈平等即佛法界今此教念佛者欲人念我自心成我自佛云何捨自心佛孤佛教耶如來不思議境界經云菩薩了知諸佛及一切法皆唯心量得隨順忍捨身速生極樂淨土照律師問經云是心作佛是心是佛心既是佛何須念他佛耶答秪由心本是佛故令專念彼佛梵網戒云信知一切衆生皆有佛性我是未成之佛諸佛是已成之佛汝心佛者未成佛也彌陀佛者已成佛也未成佛者久沉欲海具足煩惱杳無出期已成佛者久證菩提具足威神能為物護是故諸佛勸令念佛即是以我未成之佛求他已成之佛而為救護耳衆生若不念佛聖凡永隔父子乖離長處輪回去佛遠矣所以文殊普賢等諸菩薩皆願念佛往生況我凡愚人耶又彼螟蛉尚聽教成可以人而不如蟲乎不願自棄迷也甚矣二略釋經題楞嚴者一切事究竟堅固也乃大部之總名圓通者聖性法門無不通也是一章之別目勢至者啓教之人也念佛者修行之法也文雖一十二行義括淨土諸典有教有機有法有喻生佛感應以遍含自他因果而該徹作心境之月燈為聖凡之舟楫故言楞嚴經勢至念佛圓通章楞下先釋名一切事三科七大也究竟空也堅固不空也合二空不空也蘊處界大本如來藏故事事究竟堅固名楞嚴定既住法位世相常住故此亦名健相三昧聖性舉理法門約教影略行果可知正顯四法互相圓遍該通也依止成定名為楞嚴依觀成慧號作圓通別目者以勢至念佛圓通乃修道二十五圓通中一也勢至下亦影略義具應云能啓能修勢至人也所啓所修念佛法也文下後結歎二先別歎彼佛教我念佛機教也母子形影染香法喻也如來憐念衆生衆生一心憶佛生佛感應也我因念佛入忍今攝念人歸淨自他因果也心境月燈者依我自心念彼佛境則佛境可彰託彼佛境念我自心則自心易顯此之彰顯皆憑月燈教法以照見也心外有境小教也境唯是心始教也即心即境終也非境非心頓也心境無盡圓也即所詮法月燈喻能詮教聲名句義門如螢燈小也攝境唯心門如火燈始也理事無礙門如星終也會相歸性門如月頓也普融無盡門如日圓也今約中二以説聖凡舟楫者念名號佛受持皈戒越於三途下下品生名為人乘其猶舠船才過溪澗念色像佛修行禪善越於四洲生下品蓮名為天乘其猶艇船出小河港念應化佛觀四真諦越於三界生中品蓮名聲聞乘其猶艨艦過於大湖念受用佛了悟因緣證二涅槃生上品蓮名緣覺乘其猶𦪶艞過於大江念法性佛智悲並運萬行繁興成無上道超凡小界上上品生名菩薩乘其猶艆䑼直過大海又持名念佛如特舟聲聞乘也觀像念佛如方舟辟支佛也觀想念佛如維舟菩薩乘也實相念佛如造舟佛乘也聖凡即所化人舟揖喻能化法故言句次總結二開章釋文二初略標將解此經五門分別一教起因緣二藏乘教攝三宗趣旨歸四略釋題名五詳解文義初二句總敘一下別列此例般若疏意略開五章前三義門後二正釋二詳解五初教興初教起因緣者智度論云如須彌山非無因緣非少因緣令得振動念佛教興亦復如是具多因緣一指出捷徑修行門路故二直示當人念自心佛故三欲令悟入佛之心性故四為顯生佛心無差別故五度脫凡外橫超三界故六接引權小圓成佛果故七充足三輩無有疑悔故八利益今後周遍無盡故九頓攝六根證圓通境故十疾空障惱定生佛土故初句標牒智下釋義二先引證如須彌下喻也念佛下合也一下次正釋楞嚴云初心入三昧遲速不同倫故知餘門學道紆回險難猶如蟻山念佛一門古稱徑路好似風水善導云唯有徑路修行但念阿彌陀佛況今持名徑而又徑者也若欲一生取辦當於是法留心二下觀經云是心作佛是心是佛諸佛正遍知海從心想生是故教人念佛即念自心佛也三下佛心性者楞嚴云我以不滅不生合如來藏而如來藏唯妙覺明圓照法界無差別論云此心性明潔與法界同體如來依此心説不思議法則知佛以如來藏淨法性為心也令悟入者起信云真如自體相者凡夫諸佛無有增減楞嚴富樓那言我與如來寶覺圓明真妙淨心無二圓滿觀經云汝等心想佛時是心即是三十二相八十隨形好是故衆生念心佛時即能悟入佛心性也四下無差別論云衆生界不異法身法身即是衆生界觀經云諸佛如來是法界身入一切衆生心想中下云若衆生心憶佛現前必定見佛則此法門能顯心佛衆生三無差別也五下凡夫外道由見思惑起業感報輪轉不休依餘法修直至惑盡始得出離名為竪出三界唯念佛門帶惑往生名為橫出三界如蟲在竹竪則歷節難通橫則一時透脫桐江法師云竪出者依諦緣度歷涉地位如取科第須有才學如歷任轉官須有功效橫出者念佛法門如人廕敘功由祖父他力不論學問有無又如覃恩普轉功由國王不論歷任淺深六下菩薩六心墮落聲聞塵劫不回猶菴羅華魚子一般因中雖多結果者少若能念佛圓發三心自然轉權成實回小向大如彼白衣驟貴平地舛仙者然故大本云菩薩欲令衆生速疾安住無上菩提者應當起精進力聽此法門又華嚴十地始終不離念佛圓教登地尚爾況權小初心人耶七下上品利根聞小教則悔下品鈍根聞大教則疑所以華嚴會上聲聞絶分阿含時中菩薩不被今此念佛一法如萬應膏毒病皆愈似及時雨藥木並茂故得利鈍盡攝上下均收也八下利今即佛在機宜利後即滅後聞見下云今於此界攝念佛人歸於淨土觀經云如來今者為未來世一切衆生為煩惱賊之所害者説清淨業故如如意珠利濟無盡也九下一切衆生迷常住心用諸妄想循諸色聲違圓通境今念佛也六根都攝守於真常常光現前圓通境發雖不欲證不可得也故華嚴解脫長者云知一切佛猶如影像自心如水水清而靜月現全體又偈云菩薩清涼月常遊畢竟空衆生心垢淨菩薩影現中則知衆生淨念彌陀定放光明心水不淨菩薩圓通月境亦不現矣十下末法修行多諸障難邪魔嬈亂佛道難成今修念佛三昧承佛願力威神疾除煩惱頓破無明五蘊魔銷三身佛現當生極樂佛土成真應二果矣如大明燈然於室中不唯破千年暗而且見種種物然此十因生起有序初以入道多門難易各別出念佛法最為徑捷二所以徑捷者為念自心佛故三由念心佛方能成佛心故四佛心若契生佛同體無有二故五既無二別豈有凡外不度脫故六豈獨凡外亦接權小人故七豈唯五乘亦充足一切善惡衆生故八豈但現今亦普利未來無有盡故九濟度如是廣大者為圓通故十有作之修終成敗壞現既圓通當必見佛歸淨土故又由定生佛土所以指出捷徑門路令預修行疾成佛故如此終始連環猶同鈎鎖此教之興非無因也二藏攝二藏乘教攝者謂三藏之中契經藏攝二藏之內菩薩藏攝三乘之中大乘所攝五教之內後三教攝二句標章謂下釋相三藏者一修多羅此云契經即經藏詮於定學二毗奈耶此云調伏即律藏詮於戒學三阿毗達磨此云對法即論藏詮於慧學今此經者屬於經藏自始至終專説念佛三昧故二藏者一菩薩藏詮示菩薩理行果故二聲聞藏詮示聲聞理行果故今此經者屬菩薩藏此經演説菩薩念佛圓通法故三乘者一小乘聲聞謂四諦法門運載衆生出於三界到涅槃城成阿羅漢猶如羊車二中乘緣覺謂因緣法門運載衆生過於四空居寂滅舍成辟支佛猶如鹿車三大乘菩薩謂六度法門運載衆生超凡小境直至無上菩提大般涅槃彼岸成於佛果猶如牛車今此經者屬於大乘以如來憐念衆生勢至攝念佛人安樂諸乘度脫九界故五教者一小教唯談人空故二始教但明法空故亦名分教但説法相故三終教復説中道故亦名實教多談法性故四頓教唯辨真性故五圓教唯説法界故今此經者屬後三教下云二憶念深母子歷生不相違遠終也漸漸念時終當成佛故下云以念佛心入無生忍不假方便頓也知佛即心疾成佛道故下云都攝六根淨念相繼得三摩地圓也了三無別圓通法界故準知此經教義深廣幽遠非淺近矣三宗趣三宗趣旨歸者有總有別總以憶佛念佛為宗見佛入忍心境圓通為趣別有五對一教義以教説為宗令達義為趣二事理舉事相為宗詮顯理為趣三境智三佛境為宗二觀智為趣四行位信願行為宗入不退為趣五因果以因行為宗克果德為趣三句牒門謂宗旨歸趣也當經所崇曰宗宗之所歸曰趣若不識宗無從趣向矣有下釋義教説者即念佛教門也達義者謂了達教中所詮心境緣念生佛感應染香入忍自他生土之義也事理義中所具者謂崇尚念佛等事其意云何正欲彰顯彌陀自性淨土唯心之至理也境智理內開者境即所觀之理智是能觀之心佛之圓融三身真境也事一心理一心真觀也行位隨智起者信願行三資糧也不退者信淨在離三界位不退也願見佛念佛心念不退也行淨業攝佛人行不退也又信化佛教超凡外道信不退也願報佛果超二乘境念不退也行法佛理超權修證行不退也起信疏云約有三位一信行未滿未名不退但以處無退緣故稱不退二信滿已去入十住位得見法身住於正定故名不退三二賢位滿入初地去證遍滿法身生無邊佛土故名不退由信成信不退由願成住不退由行成地不退地論師云住是證不退行是位不退向是行不退地是念不退由信成證位行成行願成念也因果不退之所成者因若不退名為真因果若不退名為真果信願佛土攝根淨念是不退菩提因行也得三摩地第一圓通是不退菩提果德也文有三重憶念彼佛因也現當見佛果也念見近佛因也心開香嚴果也念心入忍因也攝人歸土果也如是五對展轉相因以為生起四釋題四略釋題名者有四對義初總別謂楞嚴三字總稱也總通彼大部故勢等七字別號也別局此一章故二教義就前別中分教義二謂章之一字是能詮教也勢等六字是所詮義也三果因就前義中開此一對謂圓通是果所證境故勢等是因能修觀故四人法就前因中分成此對念佛法也即所稟法勢至人也是能弘人依四對義立斯名耳四下標牒有下解釋此句列也初下釋也總中亦影一對楞嚴義也局也經字教也通也今不出者恐混濫故章屬能詮者謂是圓通文字念佛教章也果因對亦可名境智對圓通境也念佛智也亦可名真俗理事性修寂行對圓通真理性寂也勢至念佛俗事修行也四下念佛法者念變化非受用佛化身小也念受用非變化佛自報終也念亦變化亦受用佛他報始也念非受用非變化佛法身頓也念圓通無障礙佛十身圓也勢至人者得應化佛力小勢至也得功德佛力始勢至也得智慧佛力終勢至也此二報佛得如如佛力法佛頓勢至也得無盡佛力十佛圓勢至也此亦約教略釋下更詳解則知此題名內人法雙彰因果並舉理盡義周故標章首五解文分三初敘禮白儀大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言疏梵語摩訶那鉢此云大勢至思益云我投足之處震動三千大千世界及魔宮殿故名大勢至觀經云此菩薩行時十方世界一切震動此菩薩坐時七寶國土一時動搖亦名得大勢悲華云願我世界如觀世音等無有異寶藏佛言由汝願取大千界故今當字汝為得大勢亦名無邊光觀經云以智慧光普照一切令離三途得無上力若依本文能念大勢佛能攝六根妄能接念佛人故名為勢至也假此菩薩為發起者表念佛法門能發智光得大勢力離三界苦取淨土樂也於法自在名為法王從法化生稱之為子悲華經云往昔因中彌陀作輪王時觀音為長子勢至為次子今在極樂居佛左右助化一切次補佛處故名法王子也與共也倫類也聲氣相應名為同類五十二者數也表勢至念佛一門能攝信等五十二位諸法行故菩薩具云菩提薩埵肇云菩提佛道名也薩埵秦言大心衆生有大心入佛道名菩提薩埵賢首云菩提此名曰覺薩埵此曰衆生以智上求菩提用悲下救衆生名菩提薩埵也從座起者師資尊卑名分秩然有所陳白不應坐故頂禮佛足者以己上頂禮佛足下敬之至也上皆身業白佛言者上示曰告下啓曰白是口業也身口恭敬意業可知鈔梵語下釋人名也先勢至中初約行中修自行也由有智斷威勢故能震動一切亦名下次約願上求佛道也由有想念勢力故能取證淨土亦名下三約悲下度衆生也由有化導勢力故能救拔三途上二自利此一利他依本文者上通諸經釋名此局當經釋也能念三句亦約上求中修下度三義以釋大勢佛者指彌陀言十方三世佛中彌陀為第一故能念非如衆生不求大勢佛及斷苦法故能攝非如衆生六根攀緣六塵故能接非如衆生自利不耐他榮故有此三大德威勢之至也菩薩名實相稱衆生無勢可知於法下次法王子自在為王者王以自在為義故次補佛者彼土彌陀佛後次當觀音補位觀音之後次乃勢至補位猶如儲君暫居東宮後必南面紹王位也與下三與同倫易曰同聲相應同氣相求故曰聲氣相應若依華嚴有八十四同始從念慧趣覺終至不虗出離故名同類如七十三茲不繁録道不同不相為謀同心言其臭如蘭故云與同倫也五下四五十二信佛是心信心作佛即攝十信法行住在三昧觀佛實相即攝十住法行行念佛行度念佛人即攝十行法行回念佛心向佛心住即攝十向法行心地觀佛地如佛地即攝十地法行憶佛念佛去佛不遠即攝等覺法行心想佛時是心即佛即攝妙覺法行則知超凡入聖唯有念佛為妙矣菩下五菩薩初義約心謂能如是憶佛即成大道心衆生名為菩薩次義約境謂能以念佛心上求佛覺下化有情故名菩薩從座下釋敬禮也意可知者謂意若不恭敬則身不避席口不發言以身口禮白隨意主故所以三業皆修敬者表顯念佛乃是一切世間希有難信之法也二正陳所證分二初詳引古佛教詔又二先總明佛出我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光疏我者即自指法身不同情計我也明記不忘為憶過去稱為往昔恆河沙劫者約恆河中之沙以數劫顯其久也梵語佛陀此云覺者覺人之不覺也略開三義一自覺我空揀異凡外二覺他法空揀異二乘三覺滿俱空揀異菩薩出世者無機不興根熟則現也如來者從真如起來成正覺也十二者大彌陀經云無量光佛無邊光佛無礙光佛無對光佛炎王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛無稱光佛超日月光佛無量者實智照理無限量故無邊者權智照事無邊際故無礙者慈光與樂無障礙故無對者悲光拔苦無敵對故炎王者光音應化得自在故清淨者離垢清淨發光明故歡喜者令他受用生大喜故智慧者以大智慧破諸惑故不斷者常光不斷絶故難思者本光不思議故無稱者涌百寶光不可稱故超日月者放一切光超日月故俱名光者因中念本覺佛發明心光果上成妙覺佛現起身光故十二如來相繼一劫者一約能念表行者十二時中於自性佛淨念相繼打成一片不得彈指頃念世間五欲則無量性光自然發明也二約所得則轉十二類生而成十二聖位轉十二處妄想而成十二處佛德也然十二佛乃古如來非今彌陀而其名號同者以師資一道古今不異如釋迦觀音之類鈔我下釋我等二句我有四一執見邪我二自他慢我三名字假我四法身真我世人具邪慢學人具慢假聖人是假真今勢至乃法身大士不同三乘故唯真我恆河亦云殑伽河此云天堂來河從高處來故乃是無熱惱池流出廣四十里沙細如麵佛在祇園説法河近講堂故凡言多取以為喻梵語劫波此云分別時分俱舍云時之極少名剎那時之極長名為劫今取沙喻劫多久可知梵下釋有等六句始本合一名為覺滿我法空盡名為俱空大彌陀下引經無量下釋義諸佛名號取證不同或因或果或性或相或悲智或願行此十二佛皆以光分名者蓋光有二一智光二身光復有二義一常光二放光又有二因一是功德莊嚴二是本願成就今釋佛名亦約此六義也初二約二智三四約二心攝二因也五六七八約四身五是化身六是法身七是他受用身八是自受用身即楞伽中應化佛如如佛功德佛智慧佛也九十常光十一二放光自性佛者謂念自性佛也不得念五欲者觀經云夫念佛者不得一彈指間念世五欲是謂繫念脫能如此一無間雜無量自性佛光終得發明超於日月也十二類生者謂胎卵濕化有色無色有想無想非有色非無色非有想非無想也十二聖位者謂乾信住行向暖頂忍世地等妙也無漸位者經云從是漸修隨所發行安立聖位故詳如楞嚴七八卷明十二妄想者謂六根六塵妄想也經云六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復十二佛德者謂六根六塵功德也經云總括始終六根之中各各功德有千二百詳如楞嚴四七卷明然下通妨難云據大本意十二佛名乃無量壽佛別號唯一佛身此何説言有十二佛相繼出耶故此通云諸佛同名甚多故十二佛乃是往古非今法藏所成佛也若爾何以今名濫古號耶故又釋云詳彌陀勢至同時發心所師之佛亦同無異而今彌陀十二別號同古佛者表顯師資即心即佛之道一也猶今釋迦立號倣同古釋迦佛今觀音名倣同古觀音等故大本彌陀經云過無量佛剎同名釋迦者不可勝數則無量壽佛之名百千萬億不可窮盡何止於一佛耶次別示教道二初標名彼佛教我念佛三昧疏彼佛十二佛也語言指示謂之教言念佛者若據事念一心憶想之謂念三身接引之謂佛則能念屬己所念屬佛若據理念念即始覺佛即本覺以始合本名為念佛念佛有四一稱名謂聞説佛名一心稱念二觀像謂設立尊像注目觀瞻三觀想謂以我心眼想彼如來四實相即念自性真實相佛初二事法界觀心即佛故後一理法界觀佛即心故第三事理無礙法界觀是佛是心故又清涼云約能念心不出五種一緣想境界念佛門二攝境唯心念佛門三心境無礙念佛門四心境俱泯念佛門五重重無盡念佛門會曰一即前之初二小乘教也二即前四始也三即前三終也四五前所無者頓圓教也今此文中約佛教邊四五俱通約機稟邊唯局持名然此持名亦通圓頓不唯局小亦開五門一持念佛名門心外有佛名故小教事法界觀也二攝名歸心門佛名唯心現故始教理法界觀也三心名雙融門即心即佛故終教四心名俱絶門非心非佛故頓教理事無礙法界觀也五圓通無盡門一念心一佛名遍含法界無有盡故圓教事事無礙法界觀也梵語三昧此云正定亦云正思正心行處一心念佛名正定心若他念者即名邪思惟也三昧是禪觀通名念佛是一行別目又此念佛三昧亦名一行三昧亦名諸佛現前三昧般若三昧普等三昧鈔言念佛下釋念佛二字念佛有下明念佛法門稱名者文殊般若經云衆生愚鈍觀不能解但令念聲相續自得往生彌陀經云聞説阿彌陀佛執持名號觀像通二一觀現在相好光明之佛如法華云起立合掌一心觀佛二觀綵畫雕塑鑄造之佛如優填王以栴檀作佛像是也觀想者十六觀經云諸佛如來是法界身入一切衆生心想中是故心想佛時是心即是三十二相八十隨形好實相者觀佛三昧經云佛告阿難住念佛者心印不壞釋曰諦了自心名為念佛如如不動名為不壞解脫長者所謂我欲見極樂世界阿彌陀佛隨意即見是也初二下約觀料揀也若依六根稱名攝耳舌觀像攝眼身觀想攝鼻意實相攝六根則一念佛三昧六根無不攝也又清涼下引古明五也緣境者稱名觀像皆屬外境故唯心者依正相好唯是心作故無礙者雙照事理故俱泯者離相如空故無盡者於一切時處境念中普見十身諸如來故會曰下會通古今也又大疏云古人已有五門一稱名往生念佛門二觀像滅罪念佛門三攝境唯心念佛門四心境無礙念佛門五緣起圓通念佛門此之五門名則盡善釋義不周故今改之若欲曲會一二即清涼緣境無礙兼攝俱泯圓通即無盡門小教等者前之四門約觀此之五門約教互相影顯思之可知今此文下約四五念佛門判今經也佛教十二如來也通四五者以譬如下文中但云憶佛念佛不別指一門故機稟勢至等也局持名者以佛問下文中方云淨念相繼的指出持名故問何以勢至不通指耶答雖念佛三昧古稱徑路而持名一法徑而又徑何者觀像則像去還無因成間斷觀想則心粗境細妙觀難成實相則衆生障重解悟者希至於無盡則境界深廣從何領荷唯此持名最為簡捷但能繼念便得往生如驥驟餘門念佛也雖超羣馬餘門修行也未及龍飛持名念佛也鶴沖餘門念佛也已過凡禽餘門修行也爭如鵬舉持名念佛也故龍樹毗婆沙論云佛法有無量門如世間道有難有易譬如跛人陸道步行則苦一日不過數里水路乘船則樂須臾便過千里易行疾至應當念佛稱其名號本願如是問佛有無量功德一名難可攝盡況實相中離名字相云何專稱名耶答極樂依正言佛便周佛功德海舉名即盡經云治世語言皆與實相不相違背豈有萬德洪名不即是實相耶然此下重顯持名一門攝盡大小乘教無論利根鈍根均可依之而修也正定者揀念佛外皆邪定故正思者於所念境正直思察故正揀尋伺思揀昏沉正心行處者謂定心正所緣境異於無明邪所受故或云調直定由衆生屈曲散亂佛以諸三昧門令直其屈曲正其散亂故禪觀通名者如智論云一切禪定攝心皆名三昧是也一行別目者有二釋一謂萬行中一行如諸經中或以真如海印德藏為三昧或以如幻語言法界為三昧或有緣有相或無得無諍等二即指念佛三昧文殊般若經云佛告文殊欲入一行三昧者應處空間捨諸亂意不取相貌繫心一佛專稱名字隨彼方所端身正向能於一佛念念相續即是念中能見過去未來現在諸佛念一佛功德與念無量佛功德無二若得一行三昧者諸經法門皆悉了知問此教念佛為念十方佛耶為念阿彌陀耶答但念阿彌陀佛以十二如來同名阿彌陀故下云攝念佛人歸於淨土又普廣問佛十方俱有佛土何以獨讚西方佛言閻浮提人心多雜亂令其專心一境乃得往生若念十方諸佛境繁意散不成三昧況諸佛同一法身念一佛即念一切佛故問何十二佛皆教勢至念自名耶答一者十二如來本願如是如今法藏願云聞我名號乃至十念若不生者不取正覺是也二者教念十二佛名即是教念古彌陀十二別號猶今法藏教念無量壽佛即是教念無量光乃至超日月光也又此下出異名約義配教念佛小也般若始也佛現終也一行頓也普等圓也如理思之音釋天竺此云月氏沙門華言勤息般剌密帝唐翻極量譯音易翻梵語成華言也波羅夷此云棄犯此罪者永棄佛法邊外也阿鼻翻無間大地獄名釋迦牟尼釋迦翻能仁姓也牟尼翻寂默名也他音拖伽音祗毗音皮迦加音膩音尼𪱳音只阿彌陀此云無量壽亦云無量光須彌唐言妙高山王也菩提華言覺道菩薩摩訶薩菩薩此云覺有情摩訶薩此云大心衆生也摩訶般若波羅蜜摩訶翻大般若翻智慧波羅蜜翻到彼岸趁音逞隨從逐踐也迅音信疾也萎音委華草憔殘或退縮也娑婆此云堪忍堪能忍斯惡故懊音奧悔恨也抵音底至也覓音蜜追尋也幹音干辦作也躡音業蹈也阿伽陀此云普去能去衆病也陀羅尼此云總持亦云遮持即呪也耕音庚犁田也耨音羺耘草也修羅舊翻無端正新翻非天文殊此云妙德螟蛉音冥令桑蟲也括音郭包括也楫音接橈也舠音刀小船盛二百斛艇音廷盛三百斛次小船也港音講水之分派道路也艨艦音蒙監外狹而長曰艨艟上下四方有板曰艦中船也亦戰船名涅槃此云滅度亦云圓寂𦪶艞音禮耀江中大船名艆䑼音狼鄒海中大船名特方維造以舟為橋者曰造天子舟也連四船者曰維諸侯舟也兩船並者曰方大夫舟也單一船者曰特士人舟也辟支此云緣覺亦云獨覺紆音迂曲也富樓那華言滿願癊音蔭庇庥也覃音曇甸延及長市也菴羅翻難分別其果似挑非桃似奈非奈華多子少葉似柳味如梨王城種之果可療疾阿含翻教又云無比法經名也嬈音撓擾動也牒音蝶文乃躡前而起者曰牒又移前文於此曰牒也儲音除副也二也太子副君謂之儲君涌音永泛溢也殑音競祗園祗陀太子園也俱舍翻藏包含攝持之義也倣音訪效也泯音民絶也雕音雕木雕塑音素泥塑優填唐言出受王名也旃檀義翻與藥能除病故驥音記千里良馬也驟音紂馬之疾速行也沖音充與翀同不飛則已飛則沖天也鵬音朋大鵬鳥也翼如垂天之雲一舉而上九萬里遠毗婆娑此云廣解論名跛音波足偏廢行不正也尋伺粗覺名尋求細觀名伺察閻浮提華言樹洲洲中有此樹故樹名勝金蛙音哇形以蝦蟆水蟲
