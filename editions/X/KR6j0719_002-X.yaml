body:
  text: 清浙水慈雲灌頂沙門續法集二釋義二先修因二初舉喻二初二人喻譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異疏先喻單憶有離也有人喻生佛二人也一專憶者喻佛念眾生也一專忘者喻眾生不念佛也若逢不逢或見非見者以佛專念眾生未甞不在眾生前令偶逢偶見故言若逢或見也眾生專不念佛佛雖在眾生前亦蹉過不見故言若不逢見也二人下後喻雙憶不離也二相憶者喻生佛念同也二念深者喻久憶不忘也如是結指之詞乃至超略之詞謂能如是念則決定時時常相見也從生至生不相異者喻生生不相離也同形影者謂生佛世世不捨猶如形影無乖違也鈔佛專憶者含二種意一者佛有大悲願故二者佛在因地自果未圓尚於眾生念念不捨何況果後更無餘事則念眾生慇懃懇切無有加故眾生專忘亦有二意一者眾生無有信行願故二者生在迷位纏惑業苦人天因果尚不得修何況佛果豈易得者則念佛心沉埋隱沒不能發故偶逢見者諸佛菩薩不違本願遊化娑婆故令眾生偶然逢見也亦蹉過者如見文殊但覩老人貧婆等類或見本相亦不蒙法利此由惑業障覆妄見劣相如薄福見寶為蛇為蛙豈彼聖寶作意詐隱其本相耶生佛念同者謂眾生念佛猶如佛念眾生相同也久憶不忘者謂時刻在懷雖經年累月乃至盡形亦不忘也結指者指上相憶念深也超略者謂不但此生常得見佛乃至他生盡未來際亦常得見佛也乖違也異離也形影略舉一事以例不離至於聲響水波鏡光皆不相捨離也又此形影近對下喻合文意單顯獲見佛益遠對下證果文意雙顯獲見佛成二益現當見佛一益也心開染香二益也應釋文云如是一心念佛心同佛也心同形亦同形同影亦同不唯此世乃至生生世世形影皆同也楞嚴云容貌如佛心相亦同身心合成名法王子此非敵對正意故疏不釋二母子喻十方如來憐念眾生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠疏上二人喻泛指親友猶覺寬緩故此重將母子最親切者為喻使人起信行也於中亦有二先喻單憶有離首三句即上一人專憶次二句即上一人專忘如來母也眾生子也世間慈念最切者莫如母親子若悖逆忘恩負義母念或衰心生悔恨佛念眾生更過於母逆惡重者佛念愈深乃至入於阿鼻地獄代此眾生受無量苦又母念子慈止一世佛念眾生慈心無盡世世相隨無有退轉故云佛念眾生如母憶子也若子逃逝者喻眾生不念佛而墮惡道苦也雖憶何為者喻如來單憶無益也子若下後喻雙憶不離初二句即上相憶念深末二句即上生生不異謂六道眾生慕念如來猶如如來憐念眾生者然方得感應道交生佛不二也故高齊大行和尚云宗崇念佛四字教詔謂信憶二字不離於心稱敬二字不離於口任意早晚終無再住娑婆之法此為念佛第一要䇿鈔泛指者師資君臣皆該在許如來下問前言念佛但念彌陀不念諸佛云何此言十方如來耶答有二意一即指彌陀一佛以三世十方有無量彌陀佛故觀經云從下方金佛光剎乃至上方光明王佛剎於其中間無量塵數分身無量壽佛二通指十方諸佛謂不唯我彌陀一佛悲願如是即十方諸佛憐念亦然正顯佛佛道同故華嚴問明品云十方諸如來同共一法身一心一智慧力無畏亦然楞伽第四云一切諸佛有四平等所謂字平等語平等身平等法平等觀經云見無量壽佛者即見十方無量諸佛憐念者三昧經云諸佛心者大慈悲是慈悲所緣緣苦眾生若見眾生受苦惱時如箭入心欲拔其苦是以求往生者不可思惟己惡而疑佛不來接誰知佛心專於逆苦眾生之中種種救度如何自生疑阻甘心苦趣耶問逃逝二句與上專忘逢不逢義有差別否答亦同亦異同者不念佛則不能見佛雖見佛亦不蒙法利此與逃逝無異憶他何為異者謂前之喻意尚明眾生或有時而念但念之不切憶之不深故若逢不逢於佛憶猶為有益此中喻意竟明眾生不唯忘念而且謗佛以不信故墮在三途受無量苦故若逃逝於佛憶則為無益感應生佛者子喻生感母喻佛應也道交不二合不違也故高齊下彼論云往生淨土要須有信信千即千生信萬即萬生信佛名字不離心口諸佛即救諸佛即護心常憶佛口常稱名身常尊敬始名深信二合法若眾生心憶佛念佛現前當來必定見佛疏眾生心者揀口念而心不念也憶記持不忘也念繫緣在懷也又初時偶然勉強記憶曰憶後時長久熟脫緣念曰念又憶是暫念一憶之謂念是數憶常念之謂若事憶念則專心注意毫無雜緣若理憶念則唯妙覺明圓照法界佛亦有二一事相即是三身十身二理性唯是一真法界又事理憶念佛中復各有二一行布二圓融謂先念化報然後法等是事次第也若三若十同在一心是事一時也先空次不空後空不空是理次第也三如來藏心佛同在一時中念是理圓融也問若心外有佛何容理念設心外無佛烏用事為答心外有佛者由我心佛成彼外佛經云諸佛正知從心想生故須理念心外無佛者託心外佛顯我心佛經云心想佛時是心作佛故須事念若離事理二念何名即心即佛問若即佛是心秪應念心何必念佛又即心是佛秪應念佛何必念心答但執即佛是心不知即我本覺心性是彼究竟覺佛經云是心即佛三十二相故不妨念佛又執即心是佛不知即彼究竟覺佛是我本覺心性經云諸佛入於眾生心中故不妨念心若心佛偏念即義不成矣問一真法界體無二相何存內外心佛念耶答法界一真本無內外不屬佛心佛自證窮知生等有欲令生悟義分心佛佛為外境心為內境憶念功成自然證知心無佛外之心佛無心外之佛唯一法界普融無盡現前見佛者謂不離現陰於定中見或於夢中見也當來見佛者謂報終陰壞見佛來迎或於華中見也而云必定者有二意一感應道交難思議故謂信得即心是佛專於事念念相好佛故見果報佛來入我心中經云是心作佛諸佛如來來入一切眾生想中二始本契合法爾然故謂信得即佛是心專於理念念本性佛故於自心中見法身佛現經云是心是佛心想佛時是心即是三十二相此中不合佛念眾生者重在眾生念佛故鈔憶下唯識云云何為念於曾習境令心明記不忘為性定依為業謂數憶持曾所受境令不忘失能引定故於曾未受體類境中全不起念設曾所受不能明記念亦不生慈雲懺主云凡涉歷緣務而內心不忘於佛謂之憶念譬如世人切事繫心雖經歷語言去來坐臥種種作務而不妨密憶前事宛然念佛之心亦應如是若或失念數數攝還久久成性任運常憶又復覺心微起惡念即便憶佛以佛力故惡念自息若見他人受苦以念佛心憐愍於彼願其離苦如是相續念佛繫心能辦一切淨土功德若事下謂此中專心憶念及下攝根淨念即彌陀經一心不亂一向專念觀經一心繫念也皆通事理事則能所緣歷心佛分明唯此一念更無餘念念念相續成就定力起信謂以專意念佛因緣是也理則能所一如心佛不二唯此一緣更無餘緣緣心自在成就慧力起信所謂雖念亦無能念可念是也又普門疏云若用心存念無有間斷名事一心若了此念心四性不生名理一心對前四種五種念佛一一具此事理二念問前四五門與此事理俱約能念為義有異否答前之四五乃標法門方便有多此之事理是約行人用心各別是故四五門中必具二心二心之中必攝四五無混濫也問此中事理與前四五念佛判事理觀何別答前則別判四五門各屬事理此則通判四五一一并有事理較之前略今細故不同也然此二念中雖不可缺一亦有上智專於理念或有鈍根專於事念或有中人兼於理事皆隨機宜不必疑阻以得見佛利益同故佛亦下問三中法身十中智空身等何亦稱為事耶答墮數量三十數也故屬佛身身相事也故問起信云若人專念阿彌陀佛所修善根即得見佛豈非事念又云若觀彼佛真如法身常勤修習畢竟得生豈非理念今何以法不屬理耶答論對報化故屬理念今對一真故又屬事所以文殊般若明一行念佛三昧先明不動法界繫緣法界等大疏亦云一法界行亦無一故問十身佛獨出華嚴餘所無者云何今教念耶答諸佛說教雖別三十身同故觀經云諸佛如來是法界身如德雲但念十身佛也清涼疏鈔亦云然其念佛三昧總相則一別即三身十身修觀各別三身者謂念法報化佛於三身中各有依正便成六觀謂念法性身土為法身依正念報身華藏等剎為依十身相海等為正念餘淨土水鳥樹林為化身依三十二相等為化身正十身者謂念願智法力持意生化威勢及菩提福德相好莊嚴身如是重重成帝網境則入普賢念佛之門詳在六十二卷行布漸次也圓融一念也利根則圓融下愚則漸次中根則不定又或利根先理後事鈍根先事後理皆隨機便無一定相先空等者且約當部四卷三如來藏心明若對所念理中法界應云先無為理法界佛次有為事法界佛後理事無障礙法界佛以法界如來藏同一心故左右言也問下通妨初釋二種念中隨用一種不須兼具難次釋心佛即中隨念一即不必並驅難三釋即心即佛成心佛兩存難定中見者華嚴四十六云若有眾生專心憶念則佛現其前等六十二云住自在心念佛門隨自心樂現其像故住一切境念佛門普於諸境見佛現故楞伽云諸佛有二加持謂令入三昧一也現身灌頂二也諸菩薩等為二持故即能親見一切諸佛觀經云無量壽佛相好光明徧十方界念佛眾生攝取不捨故禪觀中皆得見也夢中見者法華云若於夢中見諸如來坐師子座圍繞說法彌陀下輩文云此人臨終夢見彼佛亦得往生報終見佛者稱揚諸佛功德經云若有得聞彌陀名者一心信樂其人命終阿彌陀佛住其人前鼓音王經云若有受持彼佛名號臨命終時阿彌陀佛即與大眾住其人前令其得見華中見者觀經下品中生文云吹諸天華華上皆有化佛菩薩迎接此人如一念頃生蓮華內經於六劫蓮華乃敷觀音勢至為說經典問今有專心念佛於定夢中亦不見佛又有一生念佛及臨終時亦不生方何也答專心念佛定夢中不見者由其過去業障重故現在善力弱故又佛有二加被一者無障則顯加令其親見二者障重則冥加暗令得益故普賢云有諸眾生心中發明普賢行者我時分身皆至其處縱彼障深未得見我我與其人暗中摩頂擁護令就一生念佛不生方者念佛不精誠故生疑不篤信故無有往生願故不能斷貪愛故問現在善根淺薄可以增修過去業障深重云何得知而為對治答有二揀別一者三昧中若有善根發相則知過去種植善因何為善發略開四種一念化佛善根發相者於念佛三昧中忽然憶佛修六度萬行成三十二相身有好光心有智慧說法利生降伏魔怨作是念時生敬愛心開發三昧增進佛行或於定中見佛身相心淨信解或於夢中聞佛說法覺悟佛心二念報佛善根發相者於念佛時忽然憶佛圓滿果報之身皆是無漏功德成就相好光明一一無量神通智慧充滿法界相續湛然盡未來際作是念時慧解分明定心安隱善念相續或於定中聞說不思議佛法境界即便出生無量智慧法門或於夢中見八萬四千諸妙相好即便出生無量願行功德三念法佛善根發相者於三昧時忽然憶佛真實性身清淨無相猶如虗空唯是第一義諦無有世諦境界離生離滅無作無為非來非去不減不增作是念時善心開發入定安樂通達無量法門現起無邊佛境或於定中見佛以微妙法身具諸相好即便覺悟遠離常無常而現常無常唯識云法身五法為性非淨法界獨名法身如是悟時開發實智三昧現前或於夢中見佛以諸法如義而為其身即便覺悟以真如為佛無境不是佛大品云諸法如實相諸法如實即是佛離是之外更無別佛如是悟時清淨六根法性現前四念十佛善根發相者於禪觀中忽然憶佛法界身雲依正圓融真應無礙一多即入大小隱顯亦理亦事亦人亦法亦此亦彼亦因亦果亦九界亦佛界亦三身亦十身作是念時開發無盡善心出生無盡三昧滅重重煩惱顯重重法性或於定中見無障礙佛剎剎塵塵現身說法即便證知德雲一念佛門出生二十一門如是知後發普賢願行普賢行或於夢中見無盡身佛說法利生即便悟入威光念佛三昧統攝無盡三昧如是悟後發遮那智成遮那境以上善根皆由過去今生念佛習報相也見諸相好悉屬報因相現發諸善心皆是習因善發二者三昧中若有業障發相則知過去不種善根何為障發亦開四種一者昏沉暗蔽業障發相謂念佛時即便昏睡沉暗瞪矒無所記別令諸禪觀不得開發二者妄念散亂業障發相欲修觀時雖不昏沉而生邪想欲作四重五逆十惡毀戒等事展轉生續無時暫停因是三昧不得現前三者惡境逼迫業障發相將入定時雖無妄念而有惡境或見焚溺或聞震擊或無頭手或墮山海如是逼迫令其驚怖所發道心障礙不起四者病事苦惱業障發相當念佛時雖無上境而身忽然生諸疾病苦惱百端或為世間種種事務牽連不斷因是無生不能證入以上業障皆由過去不善報因相也因此善惡二法發相即驗自己根性是善是惡亦知自己在前生時種善不種善作惡不作惡如是見已善者增修令其圓滿惡者對治令其除滅云何治滅亦開四門一治滅昏沉障應教念化佛三十二相中隨取一相或取白毫相閉目而觀若心暗鈍懸想不成當對一尊端嚴佛相緣之入觀若不明了即開眼觀復更閉目如是想時心眼開豁即破此障無復沉睡二治滅妄念障應教念報佛所有十力四無所畏十八不共三昧解脫一切種智不可思議無量功德普現色身利益一切神通變化摧伏魔外如是念佛善法功德一切邪惡心心數法自然銷滅三治滅惡境障應教念法佛法佛者即是平等法性空寂無為無有形相既無形相焉有境界逼迫境界空故即是治滅此障四治滅病事障應教念十佛緣佛菩提威勢力持本願功德不為世間事務牽纏緣佛福德相好莊嚴意生身相不為一切病苦所惱念佛法身猶如虗空隨其智力應化一切非如眾生煩惱陰身八苦交煎世事纏縛如蠶作繭無出頭日如是念時此障即滅故知存心念佛廣大功德無有不成深重業障無有不滅也問念佛佛現亦有魔否念佛所發善根亦有魔作否耶答佛有神通力威德力本願力大光明中必無魔事或有宿障深厚及不善用心容有魔起須當辨識經論開二一所現相好不與經合者是為魔事二不與本所修行合者是為魔事至於善根發相是魔作非魔作亦有二辨一約心境久速謂此見佛聞法等事若是善根發者則報因境相暫現便謝習因善心相續不斷若是魔所作者則報因境相久久不滅或謝去更來擾亂習因善心暫發還滅或倐爾變成惡念二約煩惱輕重謂見善相發時能令心識動亂煩惱增重眾多妨礙不利定心悉屬魔作若見善相現已雖未證禪定而身心明淨善念開發煩惱輕微或三昧開通身心快樂內外安隱氣色光潤煩惱寂寂功德巍巍此為善發相也若邪正未了應當用二法以對治之一者止法謂深入三昧一心念佛於所現相悉知虗誑但平心住定不取不捨如是息心寂然不起分別時若是聖境則定力逾深善相如法若是魔境現相不久自壞縱發亦不如法二者觀法謂觀真空法界念虗空法佛推撿現相不見生處相空寂故心念亦寂知魔界如即佛界如離真如外無一法相如是觀念佛法自當現前魔境自然消滅然念佛遇魔亦萬中一也良由修淨業人具三種力一者念力二者本有佛性力三者佛攝取力云何邪魔得便擾害故稱揚諸佛功德經云若有得聞彌陀名者阿彌陀佛住其人前魔不能壞彼正覺心是故但當一心念佛莫疑慮也而云必定下釋疑難也妨曰如來者無所從來亦無所去云何有佛現在前耶故此通云有二意故佛必定見一約他佛謂法身真佛本無生滅從真起應不妨來去是故心淨佛現心垢佛滅其猶水澄月來水濁月亡也二約自佛謂本覺心佛本無來去依覺不覺不妨出沒是故心迷佛隱心悟佛顯其猶鏡塵光暗鏡潔光明也此中下亦釋疑也妨曰上二喻中俱含如來念眾生意云何合內無佛念耶故此通云眾生無有信願故此再三觀勉佛念眾生乃佛自願何待言也後證果二初法說去佛不遠不假方便自得心開疏初一句躡前修因說也次二句正明證果相也不遠者現前見中事念見他佛則先色身相佛後法身真佛理念見自佛則先分證覺佛後究竟覺佛當來見中事念見他佛則先化身佛後報身佛理念見自佛則先本覺佛後妙覺佛故云去佛不遠不假方便者約事則念佛法門即勝異方便何假餘方便門以助顯我本性也約理則念佛即是念心心佛無差自他不二豈離唯心自佛而假心外他佛作方便耶自得心開者以念佛心入佛知覺圓滿菩提歸無所得約事則佛果成證約理則覺體圓顯所得但得見彌陀何愁不開悟是也鈔初一句下略提不遠下詳釋現前等者難曰上既見佛今何又云去不遠耶故此釋云上之見佛乃是色分化本此之去佛即是法究報妙故不相違亦可由見佛故眾生與佛同在一處猶如形影不相違遠也二喻明如染香人身有香氣此則名曰香光莊嚴疏初二句舉喻法上身近佛身心開佛心合喻中人沾染香身亦有香次二句出名謂以如來法身香光莊嚴自心本覺如來如華嚴以旃檀沉水香等喻菩提心香今亦以人天名香喻如來法身功德香也鈔法上下若直約法言謂念佛名香近佛身香開佛心香鬻香長者所云發心念佛香是也喻中下起信云如世間衣服實無於香若人以香而熏習故則有香氣無明染法實無淨業但以真如而熏習故則有淨用無明染者本覺心佛藏在無明殻也彼論明在纏如來藏心今經喻出纏如來藏心故云心開謂心開成佛以近佛故如身淨成香以塗香故若依相宗立量應云念佛是有法佛心開宗因云去佛不遠故同喻如染香人香人是有法身有香光莊嚴宗因云染香故同喻如念佛出名者出三昧名亦法門名也如華嚴下七十八云如白旃檀若以塗身能除熱惱令得清涼菩提心香能除貪恚癡等熱惱令其具足智慧清涼又如天上黑栴檀香若燒一銖普熏千界菩提心香一念功德普熏法界又轉輪王有沉香寶名曰象藏若燒此香王四種兵悉騰虗空菩提心香若一發時即令一切善根永出三界又如波利質多羅樹其皮香氣一切華香皆不能及菩提心樹所發大願功德之香一切二乘五分法香悉不能及又波利華一日熏衣薝蔔等華雖千歲熏亦不能及菩提心華一生所熏諸功德香一切二乘無漏功德百千劫熏亦不能及人天香者華嚴云人間有香名曰象藏因龍鬬生若燒一丸雨七日香若遇著者皆成金色眾生齅者七日快樂無有諸病摩羅耶山出栴檀香名曰牛頭若塗身者火不能燒海中有香名無能勝若塗螺鼓其聲發時敵軍皆退阿那婆達多池側邊出沉水香名蓮華藏若燒一丸普熏閻浮聞者離罪戒品清淨雪山有香名阿盧那若有齅者離諸垢染羅剎界中香名海藏輪王燒時王及四軍皆騰虗空善法天中有香名淨莊嚴若燒一丸而以熏之普使諸天心念於佛須夜摩天香名淨藏若燒熏之夜摩天眾集天王所而共聽法兜率天中有香名先陀婆若燒一丸普雨一切供具供養諸佛菩薩普變化天香名奪意若燒一丸於七日中普雨一切諸莊嚴具清凉疏鈔云初喻發菩提心香次即忍香瞋火不燒三即進香魔軍退散次五如次是五分法身香四戒香可知五定香得離垢三昧六慧香王及四兵皆騰空者慧證空故七解脫香心念於佛脫五欲故八知見香雲集聽法是知見故九即稱法界香先陀婆一名四實此宜用醎香似此故十忘能所香故名奪意今之佛法身香具眾功德亦猶是也二略述自己修行二初自利我本因地以念佛心入無生忍疏本因因也無生果也次句徹果該因心者述己念佛非用分別意識而念乃六根都攝一心不亂念也入證也忍智也無生約理性言慧心安此無生理故名無生忍清凉疏云若約忍無生理即無生之忍若約無生之智及煩惱不生則無生即忍無生法性始終無殊證入法忍地位不等楞嚴第三漸云是人即獲無生法忍信力入印度經云無生忍法則能清淨初歡喜地得大無畏安隱之處謂菩薩生如是心我已得住無生忍故生安隱心為令他住無生忍故起安慰心仁王經云無生忍菩薩所謂遠不動觀慧遠即七遠行地不動即第八地觀慧即九善慧地也則知此忍始於三漸終於等覺今且約等覺說以勢至位居補處故上句能修證此句所悟證謂以真正淨念除滅邪妄濁想內想不起外境自寂內外法空一切無生仁王云一切法空得無生忍又無生忍亦得名無滅忍無住忍華嚴云無生忍者不見有少法生亦不見少法滅何以故若無生則無滅若無生滅則無住處今念化身佛證得空如來藏智名入無生法忍念報身佛證得不空如來藏智名入無滅法忍念法身佛證得空不空如來藏智名入無住法忍此亦舉一以攝餘耳若唯忍無生小聖亦有豈足為等覺深玄忍耶鈔六根都攝者返流旋一六用不行也一心不亂者依一藏心餘念不生也念者心為能念佛為所念念通能所忍智也不消文清凉疏下鈔云無生忍有二義一理智雙明二唯就智說復二一智不生即無分別智體無念慮故二煩惱不生妄想不起故無生法下判位上句下出得忍所以又無生下約別相義釋若無生等者具云若無生則無滅若無滅則無盡若無盡則離垢若離垢則無差別若無差別則無處所若無處所則寂靜若寂靜則離欲若離欲則無作若無作則無願若無願則無住若無住則無去無來無生無來離欲無作無願空也無滅無盡無去不空也離垢無別無處寂靜無住空不空也今念下配釋可知此亦下通妨也難曰既有無滅忍等云何獨無生耶釋曰此有二意一者舉總攝別稱為無生二者以初攝後但標無生理實具諸忍也若唯下亦通妨也難曰唯約無生法理不通無滅忍等有何過耶釋曰等覺之忍在無滅等故非淺近若唯無生小乘亦證何足深玄二利他今於此界攝念佛人歸於淨土疏此界娑婆苦世界也淨土安養樂國土也攝者持也接也生前以威力加持令不退念臨終以願力接引令得往生歸者還也此界為旅亭彼土是家鄉猶如有人因事遠遊未得歸還今遇親友指示道路速回家鄉也能攝屬勢至所攝屬行人攝則雙通能所歸義亦然能歸行人也所歸淨土也歸兼能所念佛法也有五法門見五土佛謂憶想外境念佛則生歸變化土見變化身佛攝境歸心念佛則生劣受用土見劣受用身佛心境互融念佛則歸勝受用土見勝受用身佛心境雙泯念佛則生法性土見法性身佛圓通無盡念佛則歸法界無障礙土見法界無障礙身佛人者機也具聞思修三妙慧故備信願行三資糧故始名念佛人也問設行五逆十惡亦具三資糧慧得生彼土否耶答雖有諸過於彼佛土有信行願亦名為器如三輩九品中下輩下品是也問念幾時佛得能見佛生方答隨機不定或盡形持或九十日或七七一七或十日一日或十念或一念但能稱名必得見佛況有彌陀本願勢至攝受豈有念佛不生方耶鈔此界苦淨土樂者謂此土具八苦生居胎獄老厭龍鍾病受痛疴死悲分散愛則欲合偏離冤則欲逃偏遇求則欲得偏失乃至五陰熾盛而彼國蓮華化生則無生苦寒暑不遷則無老苦身離分段則無病苦壽命無量則無死苦無父母妻子則無愛別離苦上善人聚則無怨憎會苦所欲自至則無求不得苦觀照空寂則無五陰盛苦慈雲懺主云不值佛不聞法惡友纏羣魔惱受輪迴墮惡趣塵緣障道壽命短促修行退失塵劫難成此即娑婆十種苦也常見佛常聞法聖賢會離魔事輪迴息無惡道勝緣助道壽命無量入正定聚一生行滿此即安養十種樂也歸義下清凉貞元疏問不生華藏而生極樂者何也答有四意一者有緣故彌陀願重偏接娑婆人也二者使眾生歸憑情一故若說十方皆妙初心茫然無所依托也三者不離華藏故極樂去此十萬億剎即在華藏第十三層未出剎種外出四者即本師故經云或有見佛無量壽觀自在等所圍繞既讚本尊遮那之德如是豈非本師隨名異化也事則從此界歸彼界見彌陀居極樂理則返不覺還本覺見自性居唯心問既萬法唯心何以見彼此土有苦樂生佛有來去耶答土有苦樂即心相垢淨生有來去即心性迷悟如是垢淨迷悟總不離乎法界故云心外無法楞伽亦云若一切皆心世間何處住何因見大地眾生有去來問難也如鳥喻眾生遊虗空喻自心隨分別而去喻分別識謂從自心空中而後現眾生鳥彼眾生鳥還於自心空中隨分別識去來遊履也無依亦無住如履地而行謂自心空雖無依止住處而能令眾生鳥如履平地似有依住也眾生亦如是隨於妄分別遊履於自心如鳥在虗空答釋也前四句喻後四句合聞思修者聞說佛名為聞慧憶想在懷為思慧持念不忘為修慧佛地論云菩薩履三妙慧淨土往還釋云以聞思修得入淨土故念佛人必具三慧信願行者聞念佛門心不疑貳謂之信信已而解心起樂欲謂之願願已而念心勤精進謂之行彌陀經云若有信者應當發願執持名號雖有諸過等者觀經鈔云此土博地凡夫屬邪定聚發心修行未得不退者屬不定聚已得不退者屬正定聚若生安養不論高下所以者何五逆罪人臨終十念得往生者亦得不退成正定聚故準知罪人十念即名器矣反顯世人雖行眾善於彼佛土無信行願亦名為非器也三輩九品者若發菩提心深信因果不謗三寶大修功德專念彌陀願生彼國真佛來迎坐七寶蓮住不退轉智慧勇猛神通自在此名為上輩也兼利他行若發菩提心深信因果不謗正法少修功德專念佛名回向願生化佛來迎坐蓮華中往生其國住不退轉功德智慧此名為中輩也唯自利行若發菩提心亦信因果不謗正法不造五逆雖無功德專念佛名十聲一聲臨命終時夢見彼佛亦得往生功德智慧此名為下輩也缺二利行若七日七夜禮念佛名三心至誠心深心回向發願心六念佛法僧天施戒讀經解義深信因果持戒利生發心發願回向求生者因也真佛與化佛來迎乘金剛臺即得華開見佛聞法悟無生忍受諸佛記果也此名為上品上生也若五日五夜專意念佛不謗三寶善解義趣深信因果持戒弘法發大心願回向求生者因也真佛與化佛來迎乘紫金臺經宿華開見佛聞法七日後菩提不退一小劫得忍受記果也此名為上品中生也若七日或五夜至心念佛不謗三寶深信因果持戒利物發大道心回向求生者因也真佛與化佛來接坐金蓮華一日一夜華開七日之中見佛於三七後聞法經三小劫住歡喜地果也此名為上品下生也如是三品即前上輩所開兼利他行若三日三夜禮念佛名持諸齋戒發心發願回向求生者因也真佛來引乘蓮華臺往生彼土蓮華即開聞四諦法得羅漢果果也此名為中品上生也若一日一夜稱念彌陀八戒十戒發心發願回向求生者因也真佛來引坐七寶蓮經七日開得須陀洹至半劫後成羅漢界果也此名為中品中生也若一日或一夜專意念佛孝養仁慈臨終遇善知識指示淨土法門者因也命終坐蓮華生彼經七日已聞法得須陀洹過一小劫成阿羅漢果也此名為中品下生也如是三品即前中輩所開唯自利行若不謗正法亦作眾惡命終時聞經名稱彌陀至半日或半夜者因也化佛來引坐寶蓮華經七七日華開聞法發菩提心過十小劫得入初地果也此名為下品上生也若破戒偷盜然不謗三寶臨終聞淨土法稱念佛名經一時一刻者因也化佛來引坐蓮華上過六劫後蓮華始開聞法發心果也此名為下品中生也若造五逆十惡然亦不謗正法臨終聞佛至心十念乃至一念者因也命終見金蓮華滿十二大劫蓮華方開聞實相法發無上心果也此名為下品下生也如是三品即前下輩所開無二利行問大本云唯除五逆觀經云五逆得生二義云何答大本云唯除五逆誹謗正法則知五逆而兼謗法者乃在所除也如不兼謗者亦未必除良由謗則不信不信則不生所謂疑則華不開是也觀經但言五逆不言謗法則知雖具五逆不謗法者必定得生如兼謗者亦不生也良由信則不謗不謗則華開所謂信則決定生是也下輩下品者謂下輩內之下品非中上也問大本三輩純明善行不及惡人止齊觀經前之六品云何今以下輩配下品耶答有三意一約行因善惡雖異而位次輩品正同三三成九故今取位不取行也二下輩與下品十念行同故三五逆十惡而不謗者亦攝下輩善人中故大本云地獄鬼畜生亦生我剎中墮地獄者非五逆人而何若下輩不攝置於何輩耶盡形持者大本經云一向專念無量壽佛則知一生持也九十日者般舟三昧經云九十日中常行常立一心繫念於三昧中得見阿彌文殊般若云九十日中端坐西向專念於佛即成三昧七七者大集經云若專念佛至七七日現身見佛一七者彌陀經觀經皆云一日乃至七日即得往生十日者鼓音王經云受持佛號十日十夜除捨散亂必得見佛大本云一心常念十晝夜不絕者命終必生我剎一日者大本云一心繫念於我雖止一晝夜不絕必生我剎十念者觀經云其人苦迫不遑念佛十聲稱佛即得往生一念者大本云信樂不疑乃至一念念於彼佛亦得往生問云何一念彼佛亦得生彼國土一聲彌陀能滅八十億劫生死罪耶答一心朗念積妄頓空喻如一燈能滅千年室暗一火能燒百輛車薪況乘如來本願功德豈可思議耶故法華云一稱南無佛皆已成佛道佛名經云一聞佛名滅無量劫生死之罪大悲經云一稱佛名以是善根入涅槃界不可窮盡大莊嚴經論云佛世一老人來求出家舍利弗等俱不肯度以觀彼多劫無善根故佛自度之即證道果因告大眾此人無量劫前為採薪人猛虎逼極大怖上樹稱南無佛以是善根遇我得度況有下上明自力此明他力自力復二一者稱念彼佛力如帆楫二者本有佛性力如舟船他力即是佛願攝取力如順風三事周圓必生彼土矣問佛既自來迎引何又假多少化佛授手耶答顯其功行有淺深故如善導千念而飛千光少康十聲而出十佛華嚴離垢幢菩薩偈云以佛為境界專念而不捨此人得見佛其數與心等三結答圓通佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一疏初一句牒所問包含眾妙曰圓遍入諸有曰通又總攝萬化不滯一隅曰圓統生一切無有間隔曰通次五句結能答我等四句出本因先因修無選擇者一揀非那律選眼空生擇意二外不選六根相浮勝二根相也內不擇六根性見聞覺知性也根都攝者對上亦二義一眼不取色乃至意不緣法二唯依一精明心不行六根用故餘念不生曰淨念而無念故一心繫佛曰念無念而念故相繼謂事則憶念無間理則圓照無間得句後果證梵語三摩地此云等至等謂齊等離沉掉故至謂至到到勝定故亦云等持謂平等持心趣一境故雖通因果此且取功用中純熟一義故名曰得事則成念佛三昧理則顯本性如來斯為句歎殊勝問大本彌陀經云極樂清淨次於泥洹今經揀選圓通勢至念佛次於觀音返聞何稱為第一耶答就楞嚴本經有三意一文殊謂念性生滅因果殊感故第二勢至謂一心淨念現見自佛故第一二阿難循聲故返聞為當根念佛為不當根佛以聖性皆通歸元無二故稱觀音勢至並無優劣三此方教體在於音聞故以耳根圓通當此方機勢至居次十方法門念佛為最故以念佛圓通當十方機等於觀音約念佛法門中若事念他佛助顯本覺性佛則次泥洹異於觀音若理念自佛直顯涅槃心佛則等泥洹同觀音矣所謂不假方便自得心開是也如此念佛法門不稱第一而謂之何哉修心者豈可忽諸鈔牒所問者楞嚴五卷云我今問汝最初發心悟十八界誰為圓通從何方便入三摩地故此牒云佛問圓通也包含下約包遍釋圓通又下約攝生釋圓通又多門入一一門容多名之為圓如珠懸空映于五色也一入多門多門容一名之為通如泉潛流穿於十方也根都攝下佛為能攝根為所攝攝則通二二義中初通事念次通理念上無擇二義亦例此知之等至下圓覺疏翻為等至等謂平等住持雙離沉掉也至謂能到勝定及至勝位也等持下此依會玄記釋事則成等至理則成等持故開二義也問下通妨也慧覺曰或謂淨土乃聖人之權方所以接鈍根化凡器也苟能一超直入如來地何藉於他力乎答云馬鳴龍樹天親等諸菩薩皆發願往生應盡是鈍根乎釋迦於大寶積經勸父王淨飯并六萬釋種皆求生淨土應盡是凡器乎一舉心念佛即見性成佛豈非一超直入乎青草堂後身為曾魯公戒禪師後身作蘇東坡真如喆公後身多憂苦太平古老後身躭富貴海印信禪師生朱防禦家為女子豈可單仗自力乎若以此為權將何為實輕念佛者可不慎歟如此下結顯也若以念佛一門攝生世出世法言之為五欲故發心念佛地獄界也一為名利故發心念佛餓鬼界也二為眷屬故發心念佛畜生界也三為勝他故發心念佛修羅界也四畏惡道故發心念佛人法界也五求天樂故發心念佛天法界也六欣涅槃故發心念佛聲聞界也七慕無生故發心念佛緣覺界也八欲度他故發心念佛菩薩界也九希成佛故發心念佛佛法界也十堅心念佛地大也十一喜心念佛水大也十二熱心念佛火大也十三勤心念佛風大也十四虗心念佛空大也十五靈心念佛根大也十六想心念佛識大也十七念佛旋見眼根也十八念佛反聞耳根也十九念佛轉齅鼻根也二十念佛還甞舌根也廿一念佛攝覺身根也廿二念佛逆知意根也廿三念佛觀像色塵也廿四念佛聽名聲塵也廿五念佛染香香塵也廿六念佛有味味塵也廿七念佛光嚴觸塵也廿八念佛觀想法塵也廿九眼不別色眼識念佛也三十耳不別聲耳識念佛也三一鼻不別香鼻識念佛也三二舌不別味舌識念佛也三三身不別觸身識念佛也三四意不別法意識念佛也三五怖生死苦苦諦念佛也三六息諸惑業集諦念佛也三七修戒定慧道諦念佛也三八證寂滅理滅諦念佛也三九煩惱不生無明緣念佛也四十不作諸業行緣念佛也四一不托母胎識緣念佛也四二色心斷滅名色緣念佛也四三諸根灰泯六入緣念佛也四四根塵識離觸緣念佛也四五不領前境受緣念佛也四六不貪財色愛緣念佛也四七不求塵欲取緣念佛也四八業無有成有緣念佛也四九不受後陰生緣念佛也五十空無熟壞老死緣念佛也五一一心念佛萬緣自捨施度也五二一心念佛諸惡自止戒度也五三一心念佛心自柔順忍度也五四一心念佛永不退轉進度也五五一心念佛餘想不生禪度也五六一心念佛正智分明智度也五七一心念佛成正徧知菩提也五八一心念佛常樂淨我涅槃也五九寂靜念佛空如來藏也六十想像念佛不空如來藏也六一圓通念佛空不空如來藏也六二日出念佛先照時也六三食時念佛轉照初也六四亭午念佛轉照中也六五晡時念佛轉照後也六六日沒念佛還照時也六七念心外佛小教也六八念心內佛始教也六九念即心佛終教也七十念非心佛頓教也七一念普融佛圓教也七二有佛有心淨念相繼事法界也七三無佛無心不假方便理法界也七四念佛念心入無生忍事理無礙法界也七五若佛若心遍含無盡事事無礙法界也七六一念佛門含無盡義總相也七七四五義門非一念佛別相也七八十六觀等同成念佛同相也七九依報清淨非正莊嚴異相也八十念佛一門攬諸義成成相也八一四種五種各住自位壞相也八二依正功德念佛更周同時具足相應門也八三遍周諸法不離念佛廣狹自在無礙門也八四一根念佛六根都攝一多相容不同門也八五念佛三昧即一切法諸法相即自在門也八六正念佛時餘門不現秘密隱顯俱成門也八七此念佛門一切齊攝微細相容安立門也八八五種念佛互攝重重因陀羅網境界門也八九見念佛門即見無盡托事顯法生解門也九十前後念佛不異當念十世隔法異成門也九一念佛一法帶無盡法主伴圓明具德門也九二念自心佛本覺也九三念佛信心始覺中名字也九四念佛解心始覺中相似也九五念佛證心始覺中分證也九六念佛成佛究竟覺也九七當念佛時寂寞無為法身佛也九八當念佛時無德不具報身佛也九九當念佛時凡聖並欣化身佛也一百故知念佛一法攝盡一切法矣二皈命回向稽首釋迦彌陀佛觀音勢至諸聖賢仰願三寶加被力令此經疏遍塵剎見聞隨喜及持說畢竟得生安樂土回此功德向法界同成無上菩提果音釋遮那此云徧一切處亦云光明徧照瞪音證直視貌矒音蒙昏悶不了也波利質多羅此云圓生忉利天樹華開香徧五十由旬又翻間錯莊嚴眾雜色華周匝莊嚴故又云香徧樹根莖枝葉膚實莫不皆香故薝蔔音瞻部此云黃色華最香形似梔子華其樹高大摩羅耶翻高山或云牛頭亦云離垢阿那婆達多此云無熱惱池名也阿盧那此云亦色香名羅剎此云速疾鬼又云可畏暴惡須夜摩此云善時分時唱妙善樂故兜率華言知足於五欲境知止足故先陀婆此云石鹽其香似之醎水馬器皆云先陀婆今應用醎也龍鍾老病貌謂老來腰灣背跎猶如龍之鍾曲也疴音阿病也楞伽此云不可往山也佛在此說名楞伽經羅漢翻無生應供殺賊四果也須陀洹翻預流初果也般舟翻佛立常行三昧也遑音王心不暇也輛音亮車輛那律華言無貧亦云如意浮勝二根謂浮塵根勝義根也六根中各各具此二種掉音迢搖動也泥洹即涅槃音轉耳此云入滅十八界六根六塵六識也淨飯梵語閱頭檀亦翻真淨白淨王名也喆音執與哲同晡音補申時因陀羅網此云天帝網刻勢至疏鈔緣起諸修行中念佛為最念佛方法莫尚此經疏鈔之作不容己也戊午冬京兆戴復齊先生長公仁長預祝乃翁壽建華嚴會予時首眾唪至德雲念佛門諦審沉觀其夜夢本師和尚為講勢至章比曉細研清涼疏鈔遂於臘月八日開釋歷己未元宵閣筆暨夏五月貴本請教於復齊戴先生今歲七月望先生囑公即募刻之公即喜而應命即以此為起疾延生之公據壽增福益足可徵也梓人曰是佛菩薩佑耶非佛菩薩佑耶余曰當知是經義不可思議果報亦不可思議所以然者或開五欲樂或闡六塵境或為聲名之蒿矢或結世產之果因如是施資縷本有損無益今刻念佛法門供一人有一人之益供千萬人即有千萬人之益在一時一處則一時一處益盡未來遍沙界便有塵方億劫之益此則力同勢至願比彌陀攝念佛人歸安養土其無漏功德等於虗空何可以心思言議耶且既得佛心使三寶常住佛不佑之而誰佑歟故此輕小之兆不足疑也眾以為然命作文勸世普起一切人之信心復翁先生聞之曰茲事茫昧不須遄舉信心眾具廣勸奚為余曰不然生死一大事也其能脫之之法門豈曰小哉信者雖多莫能常遍今表而出之未信者令信已信者令增又何傷於轉勸乎遂記此於疏鈔之末為流通一助云時康熙庚申年十月十一日灌頂行者續法題於慈雲觀堂
